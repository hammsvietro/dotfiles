$srcPath = $HOME/.config/hypr/scripts
$ipc = noctalia-shell ipc call

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = NVD_BACKEND,direct
env = PATH,$PATH:$srcPath
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NIXOS_OZONE_WL, 1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = ELECTRON_ENABLE_WAYLAND,1



monitor=DP-1, 1920x1080@144, 0x0, 1
monitor=HDMI-A-1, 2560x1080@60, 1920x0, 1
monitor=eDP-1,preferred,auto,1
monitor=eDP-2,preferred,auto,1

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all

exec-once = gpgconf --launch gpg-agent
exec-once = dbus-update-activation-environment --systemd SSH_AUTH_SOCK=$(gpgconf --list-dirs agent-ssh-socket)
exec-once = gpg-connect-agent updatestartuptty /bye > /dev/null

exec-once = systemctl --user start hyprpolkitagent
exec-once = polkit-kde-agent

exec-once = emacs --daemon 
exec-once = noctalia-shell
exec-once = pywalfox start
exec-once = xwaylandvideobridge
exec-once = copyq --start-server

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = br,us
    kb_options = grp:alt_space_toggle

    follow_mouse = 1
    mouse_refocus = false
    force_no_accel = 0

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

cursor {
    no_hardware_cursors = true
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
  }

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    shadow {
        enabled = yes
        range = 4
        render_power = 3
    }
    rounding = 10

    blur {
        enabled = yes
        size = 3
        passes = 1
        new_optimizations = on
    }
}


animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = specialWorkspace, 1, 6, default, slidevert
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

misc {
    disable_hyprland_logo = true
    focus_on_activate = false
}

# --- Window Rules ---

# General Apps
windowrule = match:class ^(emacs)$, workspace 3
windowrule = match:class ^(discord)$, workspace 6
windowrule = match:class ^(whatsapp-electron)$, workspace 6
windowrule = match:class ^(notion-app)$, workspace 7
windowrule = match:class ^(obsidian)$, workspace 7
windowrule = match:class ^(com.stremio.stremio)$, workspace 9

# Steam (Consolidated)
windowrule = match:class ^([Ss]team)$, match:title ^([Ss]team)$, workspace 8 silent, tile 1
windowrule = match:class ^([Ss]team)$, match:title ^(notificationtoasts_.*_desktop)$, no_focus 1

# XWayland Video Bridge (Consolidated & Fixed)
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 0.0, no_anim 1, no_initial_focus 1, no_focus 1, max_size 1 1, no_blur 1

# --- Smart Gaps ---
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

windowrule = match:workspace w[tv1], match:float 0, border_size 0, rounding 0
windowrule = match:workspace f[1], match:float 0, border_size 0, rounding 0

# XWayland Video Bridge
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 0.0
windowrule = match:class ^(xwaylandvideobridge)$, no_anim on
windowrule = match:class ^(xwaylandvideobridge)$, no_initial_focus on
windowrule = match:class ^(xwaylandvideobridge)$, max_size 1 1
windowrule = match:class ^(xwaylandvideobridge)$, no_blur on

# Steam
windowrule = match:class ^([Ss]team)$, match:title ^([Ss]team)$, workspace 8 silent
windowrule = match:class ^([Ss]team)$, match:title ^([Ss]team)$, tile on
windowrule = match:class ^(steam)$, match:title ^(notificationtoasts_.*_desktop)$, no_focus on

$mainMod = SUPER

bind = $mainMod SHIFT, return, exec, alacritty
bind = $mainMod SHIFT, Q, killactive, 
bind = $mainMod SHIFT, E, exit, 
bind = $mainMod, I, togglefloating, 
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, space, togglesplit, # dwindle
bind = $mainMod SHIFT, S, exec, grimblast --notify --freeze copy area
bind = $mainMod, PERIOD, exec, emacsclient -c -a "emacs"

bind = $mainMod, C, exec, $ipc calendar toggle
bind = $mainMod, D, exec, $ipc launcher toggle
bind = $mainMod, S, exec,  $ipc controlCenter toggle
bind = $mainMod SHIFT, L, exec,  $ipc lockScreen lock
bind = $mainMod CTRL SHIFT, L, exec,  $ipc sessionMenu lockAndSuspend
bind = SUPER, comma, exec, $ipc settings toggle


# Move focus with mainMod + arrow keys or cycle next with j and k
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, J, cyclenext, prev
bind = $mainMod, K, cyclenext

# Move window
bind = $mainMod SHIFT, J, swapnext, prev
bind = $mainMod SHIFT, K, swapnext


# Resize windows
bind=$mainMod,L,resizeactive,35 0
bind=$mainMod,H,resizeactive,-35 0


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, moveworkspacetomonitor, 1 current
bind = $mainMod, 1, workspace, 1

bind = $mainMod, 2, moveworkspacetomonitor, 2 current
bind = $mainMod, 2, workspace, 2

bind = $mainMod, 3, moveworkspacetomonitor, 3 current
bind = $mainMod, 3, workspace, 3

bind = $mainMod, 4, moveworkspacetomonitor, 4 current
bind = $mainMod, 4, workspace, 4

bind = $mainMod, 5, moveworkspacetomonitor, 5 current
bind = $mainMod, 5, workspace, 5

bind = $mainMod, 6, moveworkspacetomonitor, 6 current
bind = $mainMod, 6, workspace, 6

bind = $mainMod, 7, moveworkspacetomonitor, 7 current
bind = $mainMod, 7, workspace, 7

bind = $mainMod, 8, moveworkspacetomonitor, 8 current
bind = $mainMod, 8, workspace, 8

bind = $mainMod, 9, moveworkspacetomonitor, 9 current
bind = $mainMod, 9, workspace, 9

bind = $mainMod, 0, moveworkspacetomonitor, 10 current
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Scratchpad
bind = $mainMod SHIFT,O,movetoworkspace,special
bind = $mainMod, O, togglespecialworkspace


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

source = /home/hammsvietro/.config/hypr/noctalia/noctalia-colors.conf

